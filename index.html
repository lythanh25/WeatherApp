<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h2>🌤 Weather App</h2>

      <form>
        <input type="text" placeholder="Nhập thành phố..." id="name__city" />
        <button>Search</button>
        <button type="button" id="toggle">🌙 Dark</button>
        <button type="button" id="clearHistory">🗑 Xóa lịch sử</button>
      </form>

      <p class="loading" id="loading">Loading...</p>
      <p class="error" id="error"></p>

      <h3 id="city"></h3>
      <p id="temp"></p>
      <p id="humidity"></p>
      <p id="wind"></p>
      <img id="icon" />
      <p id="desc"></p>

      <ul id="history"></ul>
    </div>

    <script src="./main.js"></script>
  </body>
</html>
